name: Tool compatibility

on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * 1'

permissions:
  contents: read

jobs:
  uv:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
        uv: ["0.9.0", "0.10.0", "latest"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install uv
        shell: bash
        run: |
          if [[ '${{ matrix.uv }}' == latest ]]; then
            python -m pip install uv
          else
            python -m pip install 'uv==${{ matrix.uv }}'
          fi
      - name: Install Depviz
        run: python -m pip install -e '.[dev]'
      - name: Compatibility tests
        run: python -m pytest -m compatibility

  conda-family:
    strategy:
      fail-fast: false
      matrix:
        tool: [conda, micromamba]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: mamba-org/setup-micromamba@v2
        if: matrix.tool == 'micromamba'
        with:
          environment-name: compatibility
          create-args: python=3.12
      - uses: conda-incubator/setup-miniconda@v3
        if: matrix.tool == 'conda'
        with:
          python-version: "3.12"
          auto-activate-base: true
      - name: Install Depviz
        run: python -m pip install -e '.[dev]'
      - name: Deterministic compatibility tests
        run: python -m pytest -m compatibility
      - name: Tool health
        shell: bash
        run: |
          if [[ '${{ matrix.tool }}' == conda ]]; then
            depviz doctor --plugin depviz-conda --tool conda --executable conda
          else
            depviz doctor --plugin depviz-conda --tool micromamba --executable micromamba
          fi
